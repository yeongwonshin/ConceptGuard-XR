misconceptions:
  - id: open_circuit_confusion
    concept: closed_circuit
    description: 한쪽만 연결해도 전류가 흐른다고 생각한다.
    signals:
      - graph_has_open_path
      - explanation_mentions_connected_once
    feedback: 전류가 다시 배터리로 돌아오는 길이 있는지 확인하게 한다.

  - id: series_parallel_confusion
    concept: topology
    description: 직렬과 병렬 연결의 경로 차이를 구분하지 못한다.
    signals:
      - graph_topology_conflicts_with_explanation
      - repeated_rewiring_same_topology
    feedback: 전류가 갈 수 있는 길의 개수를 XR 경로로 시각화한다.

  - id: current_consumption_misconception
    concept: current_conservation
    description: 전류가 전구나 저항에서 소모된다고 생각한다.
    signals:
      - explanation_mentions_current_consumed
      - prediction_current_after_bulb_lower
    feedback: 전구 전후의 전류값을 동시에 보여주는 반례 시뮬레이션을 제공한다.

  - id: voltage_current_confusion
    concept: voltage_current_relation
    description: 전압과 전류를 동일한 물리량처럼 사용한다.
    signals:
      - explanation_uses_voltage_current_interchangeably
      - prediction_ignores_resistance_change
    feedback: 전압은 밀어주는 차이, 전류는 흐르는 양이라는 비유와 시뮬레이션을 연결한다.
