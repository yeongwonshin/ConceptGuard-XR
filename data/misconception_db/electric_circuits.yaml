misconceptions:
  - id: open_circuit_confusion
    concept: closed_circuit
    description: The learner thinks current can flow even when only one side is connected.
    signals:
      - graph_has_open_path
      - explanation_mentions_connected_once
    feedback: Ask the learner to check whether current has a path back to the battery.

  - id: series_parallel_confusion
    concept: topology
    description: The learner does not distinguish the path structure of series and parallel circuits.
    signals:
      - graph_topology_conflicts_with_explanation
      - repeated_rewiring_same_topology
    feedback: Visualize the number of available current paths in XR.

  - id: current_consumption_misconception
    concept: current_conservation
    description: The learner thinks current is consumed by bulbs or resistors.
    signals:
      - explanation_mentions_current_consumed
      - prediction_current_after_bulb_lower
    feedback: Show current values before and after the bulb at the same time as a counterexample simulation.

  - id: voltage_current_confusion
    concept: voltage_current_relation
    description: The learner uses voltage and current as if they were the same physical quantity.
    signals:
      - explanation_uses_voltage_current_interchangeably
      - prediction_ignores_resistance_change
    feedback: Connect the idea that voltage is the driving difference and current is the amount of flow to the simulation.
