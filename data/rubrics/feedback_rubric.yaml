rubric:
  minimal_hint:
    when: MRR < 0.25
    principle: Preserve the learner's inquiry flow.
  check_question:
    when: 0.25 <= MRR < 0.50
    principle: Ask the learner to re-check their own explanation.
  counterexample_simulation:
    when: 0.50 <= MRR < 0.75
    principle: Let the learner experience the difference between prediction and observation in XR.
  direct_explanation_and_retry:
    when: MRR >= 0.75
    principle: Prevent the misconception from becoming reinforced by giving an explicit explanation and asking for another attempt.
