rubric:
  minimal_hint:
    when: MRR < 0.25
    principle: 학생의 탐구 흐름을 유지한다.
  check_question:
    when: 0.25 <= MRR < 0.50
    principle: 학생이 자기 설명을 재점검하도록 질문한다.
  counterexample_simulation:
    when: 0.50 <= MRR < 0.75
    principle: 예측과 관찰의 차이를 XR로 경험하게 한다.
  direct_explanation_and_retry:
    when: MRR >= 0.75
    principle: 오개념 고착을 막기 위해 명시 설명 후 재조작을 요청한다.
